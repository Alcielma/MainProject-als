<div class="container">
  <button (click)="goBack()" class="back-button">← Voltar</button>
  
  <h2>Confirmar Agendamento</h2>
  
  <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()">
    <div *ngIf="appointmentDetails">
      <p>Data do Agendamento: {{ appointmentDetails.scheduledDateTime | date: 'dd/MM/yyyy' }}</p>
      
      <label for="time">Hora:</label>
      <input type="time" id="time" formControlName="time" required>
    </div>
    
    <button type="submit" [disabled]="appointmentForm.invalid">Confirmar Agendamento</button>
  </form>
</div>
